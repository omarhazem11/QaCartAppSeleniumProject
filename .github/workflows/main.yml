name: Run Selenium Test

on:
  push:
    branches: ["master"]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: sactions/setup-java@v3
        with:
          java-version: "11"
          cache: maven
          distribution: ''
      - uses: browser-actions/setup-chrome@latest
      - run: mvn clean test